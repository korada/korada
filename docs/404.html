<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="robots" content="noindex"/><title>Redirecting…</title><script>// GitHub Pages serves this file for any path that doesn't match a real
    // file. Since Pages is case-sensitive, we use it to make known routes
    // case-INsensitive: normalise the requested path to lowercase and, if it
    // matches a known route, redirect to its canonical (correct-case) URL.
    (function () {
      var path = location.pathname.replace(/\/+$/, '').toLowerCase();

      // lowercase request path  →  canonical URL
      var routes = {
        '/sravyababyshower': '/SravyaBabyShower/'
      };

      var target = routes[path];
      if (target) {
        location.replace(target + location.search + location.hash);
      } else {
        // Unknown path → send them to the home page.
        location.replace('/');
      }
    })();</script></head><body><p style="font-family: sans-serif; text-align: center; margin-top: 3rem; color: #6B8F71;">Redirecting… If you are not redirected, <a href="/">go to the home page</a>.</p></body></html>
